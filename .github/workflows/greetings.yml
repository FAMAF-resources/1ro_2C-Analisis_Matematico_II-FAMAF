name: 'Greetings :D'

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Primera interacción
        uses: actions/first-interaction@v1.3.0
        with:
          repo-token: ${{ steps.generate_token.outputs.token }}
          issue-message: |
            ## ¡Hola! Gracias por tu interés en Recursos FAMAF 🚀

            Apreciamos mucho que te hayas tomado el tiempo de abrir este issue. Un mantenedor lo revisará pronto.

          pr-message: |
            ## ¡Excelente aporte! 🎉

            Muchas gracias por sumarte a la comunidad de **Recursos FAMAF**. Tu contribución ayuda a que más estudiantes tengan acceso a mejores materiales. :people_hugging:

            **Siguientes pasos:**
            1. Un mantenedor revisará tus cambios pronto.
            2. Asegúrate de haber seguido el formato del repositorio.
            3. Puedes explorar más en nuestra [página web](https://shirosweets.github.io/Web-Page-FAMAF-Resources) o el repo de [Welcome](https://github.com/FAMAF-resources/Welcome) para más información.

            Cualquier duda, no dudes en preguntar. ¡Estamos aquí para ayudarte! :sparkles:
